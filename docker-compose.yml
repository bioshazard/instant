version: "3.9"
services:
  postgres:
    image: public.ecr.aws/z9j8u5b3/instant-public:postgresql-16-pg-hint-plan
    environment:
      POSTGRES_PASSWORD: pass
      POSTGRES_USER: instant
      POSTGRES_DB: instant
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "8890:5432"

  minio:
    image: minio/minio:RELEASE.2024-03-16T04-26-08Z
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile-dev
    depends_on:
      - postgres
      - minio
    environment:
      DATABASE_URL: "postgresql://instant:pass@postgres:5432/instant"
      S3_ENDPOINT: "http://minio:9000"
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
      NREPL_BIND_ADDRESS: "0.0.0.0"
    ports:
      - "8888:8888"
      - "6005:6005"

  dash:
    image: node:20
    working_dir: /app
    volumes:
      - ./client:/app
    command: sh -c 'corepack enable && pnpm install && pnpm --filter ./www run dev'
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres-data:
  minio-data:
